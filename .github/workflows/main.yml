name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run system commands
      run: |
        echo "Starting CI"
        uname -a
        df -h
        free -m

    - name: Run system check
      run: |
        chmod +x scripts/system_check.sh
        ./scripts/system_check.sh